<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>윤희야 대박나라 화이팅</title>
<style>
:root {
  --bg:#f3f5f8;
  --panel:#ffffff;
  --ink:#111827;
  --muted:#64748b;
  --line:#d9e0ea;
  --red:#dc2626;
  --blue:#2563eb;
  --green:#0f766e;
  --amber:#b45309;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
header { position:sticky; top:0; z-index:2; background:#0f172a; color:white; padding:16px; box-shadow:0 6px 24px rgba(15,23,42,.22); }
h1 { margin:0; font-size:20px; letter-spacing:0; }
main { max-width:760px; margin:0 auto; padding:14px; }
button { border:0; border-radius:8px; background:var(--blue); color:white; font-weight:800; padding:10px 12px; }
input { border:1px solid var(--line); border-radius:8px; padding:9px 10px; font:inherit; min-width:94px; width:100%; }
.actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.actions button:nth-child(2) { background:var(--green); }
.stamp { margin-top:8px; color:#cbd5e1; font-size:12px; line-height:1.45; }
.metrics { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:9px; margin:12px 0; }
.metric { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:11px; }
.metric span { display:block; color:var(--muted); font-size:12px; }
.metric b { display:block; margin-top:5px; font-size:20px; }
.search-panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:12px; display:grid; grid-template-columns:1fr auto auto; gap:8px; }
.search-results { grid-column:1 / -1; display:grid; gap:7px; }
.search-card { border:1px solid var(--line); border-radius:8px; padding:9px; background:#f8fafc; }
.search-card b { display:block; }
.search-card span { display:block; color:var(--muted); font-size:12px; margin-top:3px; }
.paper-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
.paper-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:9px; }
.paper-list { margin-top:9px; border-top:1px solid var(--line); }
.paper-row { display:grid; grid-template-columns:1.1fr .7fr .9fr; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:12px; align-items:center; cursor:pointer; }
.paper-row b { display:block; }
.paper-row span { color:var(--muted); }
.paper-row-actions { grid-column:1 / -1; display:grid; grid-template-columns:1fr auto 1fr auto auto; gap:6px; }
.paper-trade { border:1px solid var(--line); border-radius:8px; background:#f8fafc; padding:9px; margin-top:9px; }
.paper-trade .trade-form { display:grid; grid-template-columns:1fr auto; gap:7px; margin-top:7px; }
.mini { padding:8px 9px; font-size:12px; }
.mini.sell { background:var(--red); }
.panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:12px; }
.panel h2 { margin:0 0 9px; font-size:16px; }
.bottom-alert { display:none; background:#fff7ed; border:1px solid #fed7aa; border-left:5px solid #ea580c; border-radius:8px; padding:12px; margin-bottom:12px; }
.bottom-alert.open { display:block; }
.bottom-alert h2 { margin:0 0 8px; font-size:16px; }
.bottom-item { border-top:1px solid #fed7aa; padding:8px 0; }
.bottom-item:first-of-type { border-top:0; }
.bottom-item b { display:block; }
.bottom-item span { display:block; color:#7c2d12; font-size:12px; line-height:1.45; margin-top:3px; }
.signals { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; }
.signal { display:flex; justify-content:space-between; gap:8px; border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12px; background:#f8fafc; }
.pos { color:var(--red); font-weight:800; }
.neg { color:var(--blue); font-weight:800; }
.sector { border-top:1px solid var(--line); padding:9px 0; }
.sector:first-of-type { border-top:0; }
.sector b { display:block; font-size:14px; }
.sector span { display:block; color:var(--muted); font-size:12px; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.stock { background:var(--panel); border:1px solid var(--line); border-radius:8px; margin-bottom:10px; overflow:hidden; }
.stock-head { display:flex; justify-content:space-between; gap:10px; padding:12px; cursor:pointer; }
.stock h3 { margin:0; font-size:16px; }
.sub { color:var(--muted); font-size:12px; margin-top:3px; line-height:1.4; }
.score { min-width:74px; text-align:right; font-size:22px; font-weight:900; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
.tag { display:inline-block; border-radius:999px; padding:3px 7px; margin:5px 3px 0 0; background:#e8f2ff; color:#0b5cad; font-size:11px; font-weight:800; }
.trade-pill { display:inline-flex; justify-content:center; align-items:center; border-radius:8px; padding:5px 8px; color:white; font-size:11px; font-weight:900; line-height:1.1; white-space:nowrap; }
.trade-buy { background:var(--green); }
.trade-sell { background:var(--red); }
.trade-hold { background:#64748b; }
.trade-text.trade-buy { color:var(--green); background:transparent; }
.trade-text.trade-sell { color:var(--red); background:transparent; }
.trade-text.trade-hold { color:#475569; background:transparent; }
.flow { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; padding:0 12px 12px; font-size:12px; }
.flow div { background:#f8fafc; border:1px solid var(--line); border-radius:8px; padding:8px; }
.flow span { display:block; color:var(--muted); }
.flow b { display:block; margin-top:4px; font-size:13px; }
.detail { display:none; border-top:1px solid var(--line); padding:12px; }
.stock.open .detail { display:block; }
.chart { width:100%; height:190px; background:#fbfdff; border:1px solid var(--line); border-radius:8px; }
ul { margin:9px 0 0; padding-left:18px; color:#334155; font-size:13px; line-height:1.55; }
.empty { color:var(--muted); text-align:center; padding:30px 10px; }
@media (max-width:520px) {
  .metrics { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .signals { grid-template-columns:1fr; }
  .flow { grid-template-columns:1fr; }
  .paper-row-actions { grid-template-columns:1fr auto; }
}
</style>
</head>
<body>
<header>
  <h1>윤희야 대박나라 화이팅</h1>
  <div class="actions">
    <button id="refresh">결과 새로고침</button>
    <button id="runAction">데이터 분석 실행</button>
  </div>
  <div class="stamp" id="stamp">데이터 불러오는 중</div>
</header>
<main>
  <section class="metrics">
    <div class="metric"><span>분석 종목</span><b id="m-count">-</b></div>
    <div class="metric"><span>발굴 강함</span><b id="m-strong">-</b></div>
    <div class="metric"><span>수급 집중</span><b id="m-flow">-</b></div>
  </section>
  <section class="search-panel">
    <input id="stockSearch" autocomplete="off" placeholder="종목명 또는 종목코드 검색">
    <button id="stockSearchGo">검색</button>
    <button id="stockSearchClear">전체</button>
    <div class="search-results" id="searchResults"></div>
  </section>
  <section class="panel">
    <h2>폰 모의투자</h2>
    <div class="paper-grid">
      <div class="metric"><span>총자산</span><b id="mp-equity">-</b></div>
      <div class="metric"><span>예수금</span><b id="mp-cash">-</b></div>
      <div class="metric"><span>수익률</span><b id="mp-return">-</b></div>
    </div>
    <div class="paper-actions">
      <input id="mp-reset-cash" type="number" min="100000" step="100000" value="10000000">
      <button id="mp-reset">계좌 재설정</button>
    </div>
    <div class="paper-list" id="mp-holdings"></div>
  </section>
  <section class="bottom-alert" id="bottomAlert">
    <h2>바닥매집 알림</h2>
    <div id="bottomList"></div>
  </section>
  <section class="panel">
    <h2>미국/글로벌 영향</h2>
    <div class="signals" id="signals"></div>
  </section>
  <section class="panel">
    <h2>섹터별 유망 후보</h2>
    <div id="sectors"></div>
  </section>
  <section id="stocks"></section>
</main>
<script>
const fmt = new Intl.NumberFormat("ko-KR");
let lastPayload = null;
const PAPER_KEY = "kstock-mobile-paper-v1";
function money(v) {
  const n = Number(v || 0);
  if (Math.abs(n) >= 100000000) return `${fmt.format(Math.round(n / 100000000))}억`;
  if (Math.abs(n) >= 10000) return `${fmt.format(Math.round(n / 10000))}만`;
  return fmt.format(Math.round(n));
}
function price(v) {
  const n = Number(v || 0);
  return n ? `${fmt.format(Math.round(n))}원` : "-";
}
function signedMoney(v) {
  const n = Number(v || 0);
  const sign = n >= 0 ? "+" : "-";
  return `<span class="${n >= 0 ? "pos" : "neg"}">${sign}${money(Math.abs(n))}</span>`;
}
function signedPct(v) {
  const n = Number(v || 0);
  return `<span class="${n >= 0 ? "pos" : "neg"}">${n >= 0 ? "+" : ""}${n.toFixed(2)}%</span>`;
}
function defaultPaper(cash = 10000000) {
  return { initialCash: cash, cash, holdings: {}, trades: [] };
}
function loadPaper() {
  try {
    return JSON.parse(localStorage.getItem(PAPER_KEY)) || defaultPaper();
  } catch {
    return defaultPaper();
  }
}
function savePaper(paper) {
  localStorage.setItem(PAPER_KEY, JSON.stringify(paper));
}
function quoteMap() {
  return Object.fromEntries([...(lastPayload?.searchItems || []), ...(lastPayload?.items || [])].map(item => [item.code, item]));
}
function evaluatePaper() {
  const paper = loadPaper();
  const quotes = quoteMap();
  let marketValue = 0, costTotal = 0;
  const holdings = Object.values(paper.holdings || {}).map(holding => {
    const quote = quotes[holding.code] || {};
    const current = Number(quote.close || holding.lastPrice || holding.avgPrice || 0);
    const qty = Number(holding.qty || 0);
    const avg = Number(holding.avgPrice || 0);
    const value = qty * current;
    const cost = qty * avg;
    marketValue += value;
    costTotal += cost;
    const signal = quote.tradeAction || holding.signal || "";
    const paperAction = signal === "매도" ? "매도 권유" : (signal === "매수권장" ? "보유/추가매수" : "보유");
    const paperReason = quote.tradeReason || quote.pro?.bias || (signal === "매도" ? "현재 분석 신호가 매도로 바뀌었습니다." : "현재가 기준으로 보유 평가합니다.");
    return { ...holding, currentPrice: current, marketValue: value, pnl: value - cost, pnlPct: avg ? (current / avg - 1) * 100 : 0, signal, paperAction, paperReason };
  });
  const totalEquity = Number(paper.cash || 0) + marketValue;
  const returnPct = paper.initialCash ? (totalEquity / paper.initialCash - 1) * 100 : 0;
  return { ...paper, holdings, marketValue, totalEquity, returnPct };
}
function renderPaper() {
  const paper = evaluatePaper();
  document.querySelector("#mp-equity").innerHTML = price(paper.totalEquity);
  document.querySelector("#mp-cash").innerHTML = price(paper.cash);
  document.querySelector("#mp-return").innerHTML = signedPct(paper.returnPct);
  document.querySelector("#mp-holdings").innerHTML = paper.holdings.length ? paper.holdings.map(item => `
    <div class="paper-row" onclick="openStock('${esc(item.code)}')">
      <div><b>${esc(item.name)}</b><span>${esc(item.code)} · ${esc(item.paperAction || "보유")}</span></div>
      <div><b>${fmt.format(item.qty)}주</b><span>평단 ${price(item.avgPrice)}</span></div>
      <div><b>${signedMoney(item.pnl)}</b><span>${signedPct(item.pnlPct)} · ${price(item.currentPrice)}</span><span>${esc(item.paperReason || "")}</span></div>
      <div class="paper-row-actions" onclick="event.stopPropagation()">
        <input id="hbuy-${item.code}" type="number" min="1" step="1" placeholder="매수수량">
        <button class="mini" onclick="mobileBuyQty('${item.code}', 'hbuy-${item.code}')">매수</button>
        <input id="hsell-${item.code}" type="number" min="1" step="1" placeholder="매도수량">
        <button class="mini sell" onclick="mobileSell('${item.code}', false, 'hsell-${item.code}')">매도</button>
        <button class="mini sell" onclick="mobileSell('${item.code}', true)">전량</button>
      </div>
    </div>
  `).join("") : `<div class="empty">보유 종목 없음</div>`;
}
function resetPaper() {
  const cash = Number(document.querySelector("#mp-reset-cash").value || 10000000);
  if (!confirm(`${fmt.format(cash)}원으로 폰 모의투자를 새로 시작할까요?`)) return;
  savePaper(defaultPaper(cash));
  renderPaper();
}
function mobileBuy(code) {
  const quote = quoteMap()[code];
  if (!quote) return alert("현재 분석 목록에 없는 종목입니다.");
  const amount = Number(document.querySelector(`#mbuy-${code}`).value || 0);
  const current = Number(quote.close || 0);
  const paper = loadPaper();
  const budget = Math.min(amount, Number(paper.cash || 0));
  const qty = Math.floor(budget / current);
  if (!current || qty <= 0) return alert("현재가 또는 예수금이 부족합니다.");
  const cost = qty * current;
  const old = paper.holdings[code] || { code, name: quote.name, qty: 0, avgPrice: 0 };
  const oldCost = Number(old.qty || 0) * Number(old.avgPrice || 0);
  const newQty = Number(old.qty || 0) + qty;
  paper.holdings[code] = { code, name: quote.name, qty: newQty, avgPrice: (oldCost + cost) / newQty, lastPrice: current, signal: quote.tradeAction || "" };
  paper.cash = Number(paper.cash || 0) - cost;
  paper.trades.unshift({ side: "BUY", code, name: quote.name, qty, price: current, amount: cost, time: Date.now() });
  paper.trades = paper.trades.slice(0, 100);
  savePaper(paper);
  renderPaper();
  alert(`${quote.name} ${qty}주 모의매수 · ${price(current)}`);
}
function mobileBuyQty(code, inputId = "") {
  const quote = quoteMap()[code];
  if (!quote) return alert("현재 분석 목록에 없는 종목입니다.");
  const input = inputId ? document.getElementById(inputId) : document.querySelector(`#mbuyqty-${code}`);
  const qty = Number(input?.value || 0);
  const current = Number(quote.close || 0);
  const paper = loadPaper();
  const cost = qty * current;
  if (!current || qty <= 0) return alert("매수 수량을 확인하세요.");
  if (cost > Number(paper.cash || 0)) return alert("예수금이 부족합니다.");
  const old = paper.holdings[code] || { code, name: quote.name, qty: 0, avgPrice: 0 };
  const oldCost = Number(old.qty || 0) * Number(old.avgPrice || 0);
  const newQty = Number(old.qty || 0) + qty;
  paper.holdings[code] = { code, name: quote.name, qty: newQty, avgPrice: (oldCost + cost) / newQty, lastPrice: current, signal: quote.tradeAction || "" };
  paper.cash = Number(paper.cash || 0) - cost;
  paper.trades.unshift({ side: "BUY", code, name: quote.name, qty, price: current, amount: cost, time: Date.now() });
  paper.trades = paper.trades.slice(0, 100);
  savePaper(paper);
  renderPaper();
  if (input) input.value = "";
  alert(`${quote.name} ${qty}주 모의매수 · ${price(current)}`);
}
function mobileSell(code, all = false, inputId = "") {
  const quote = quoteMap()[code];
  const paper = loadPaper();
  const holding = paper.holdings[code];
  if (!holding) return alert("보유 수량이 없습니다.");
  const input = inputId ? document.getElementById(inputId) : document.querySelector(`#msell-${code}`);
  const inputQty = Number(input?.value || 0);
  const qty = all ? Number(holding.qty || 0) : Math.min(Number(holding.qty || 0), inputQty);
  const current = Number(quote?.close || holding.lastPrice || 0);
  if (!current || qty <= 0) return alert("매도 수량을 확인하세요.");
  const proceeds = qty * current;
  paper.cash = Number(paper.cash || 0) + proceeds;
  holding.qty = Number(holding.qty || 0) - qty;
  holding.lastPrice = current;
  paper.trades.unshift({ side: "SELL", code, name: holding.name, qty, price: current, amount: proceeds, time: Date.now() });
  if (holding.qty <= 0) delete paper.holdings[code];
  else paper.holdings[code] = holding;
  savePaper(paper);
  renderPaper();
  if (input) input.value = "";
}
function cls(v) { return Number(v || 0) >= 0 ? "pos" : "neg"; }
function pct(v) {
  const n = Number(v || 0);
  return `${n >= 0 ? "+" : ""}${n.toFixed(2)}%`;
}
function esc(text) {
  return String(text || "").replace(/[&<>"']/g, s => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[s]));
}
function movingAverage(values, period) {
  return values.map((_, i) => {
    if (i + 1 < period) return null;
    const slice = values.slice(i + 1 - period, i + 1);
    return slice.reduce((a, b) => a + b, 0) / period;
  });
}
function tradeClass(label) {
  if (label === "매수권장") return "trade-buy";
  if (label === "매도") return "trade-sell";
  return "trade-hold";
}
function stockMatches(item, query) {
  const q = String(query || "").trim().toLowerCase();
  if (!q) return true;
  return [
    item.code,
    item.name,
    item.market,
    item.sector,
    item.theme,
    item.recommendation,
    item.tradeAction,
    ...(item.tags || []),
  ].join(" ").toLowerCase().includes(q);
}
function openStock(code) {
  const article = document.querySelector(`.stock[data-code="${code}"]`);
  if (!article) return;
  article.classList.add("open");
  article.scrollIntoView({ behavior: "smooth", block: "start" });
}
function selectSearchStock(code) {
  renderSearch(document.querySelector("#stockSearch").value, code);
  setTimeout(() => openStock(code), 0);
}
function renderSearch(query, selectedCode = "") {
  const source = lastPayload?.searchItems || lastPayload?.items || [];
  const matches = query ? source.filter(item => stockMatches(item, query)) : [];
  document.querySelector("#searchResults").innerHTML = query
    ? (matches.length ? matches.slice(0, 8).map(item => `
      <div class="search-card" onclick="selectSearchStock('${item.code}')">
        <b>${esc(item.name)} (${esc(item.code)})</b>
        <span>${price(item.close)} · ${pct(item.changeRate)} · ${esc(item.tradeAction || "보류")} · 선택하면 이 종목만 표시</span>
      </div>
    `).join("") : `<div class="search-card"><b>검색 결과 없음</b><span>데이터 분석 실행 후 다시 검색하세요.</span></div>`)
    : "";
  if (selectedCode) {
    const selected = matches.find(item => item.code === selectedCode) || source.find(item => item.code === selectedCode);
    renderStocks(selected ? [selected] : [], new Set((lastPayload?.bottomCandidates || []).map(item => item.code)));
  } else if (!query) {
    renderStocks(lastPayload?.items || [], new Set((lastPayload?.bottomCandidates || []).map(item => item.code)));
  }
  renderPaper();
}
function chart(points, item = {}) {
  const data = (points || []).filter(p => Number.isFinite(Number(p.close)));
  const w = 640, h = 190;
  if (data.length < 2) return `<svg class="chart" viewBox="0 0 ${w} ${h}"></svg>`;
  const prices = data.map(p => Number(p.close));
  const volumes = data.map(p => Number(p.volume || 0));
  const ma5 = movingAverage(prices, 5);
  const ma20 = movingAverage(prices, 20);
  const ma60 = movingAverage(prices, 60);
  const support = Number(item.bottomSupport || 0);
  const longLine = Number(item.bottomLongLine || 0);
  const resistance = prices.length > 2 ? Math.max(...prices.slice(0, -1)) : 0;
  const levels = [support, longLine, resistance].filter(v => Number.isFinite(v) && v > 0);
  const all = prices.concat(ma5.filter(Boolean), ma20.filter(Boolean), ma60.filter(Boolean), levels);
  const min = Math.min(...all), max = Math.max(...all), span = max - min || 1;
  const vmax = Math.max(...volumes, 1);
  const left = 44, right = 12, top = 16, priceH = 104, volTop = 134, volH = 34;
  const xFor = i => left + i * ((w - left - right) / Math.max(1, data.length - 1));
  const yFor = v => top + priceH - ((v - min) / span) * priceH;
  const lineFor = arr => arr.map((v, i) => v ? `${xFor(i).toFixed(1)},${yFor(v).toFixed(1)}` : "").filter(Boolean).join(" ");
  const levelLine = (value, color, label, dash = "6 4") => {
    if (!Number.isFinite(value) || value <= 0) return "";
    const y = yFor(value);
    return `<line x1="${left}" y1="${y.toFixed(1)}" x2="${w-right}" y2="${y.toFixed(1)}" stroke="${color}" stroke-width="1.6" stroke-dasharray="${dash}"/>
      <text x="${w-right-4}" y="${(y - 4).toFixed(1)}" text-anchor="end" font-size="10" font-weight="800" fill="${color}">${label}</text>`;
  };
  const priceLine = lineFor(prices);
  const color = prices[prices.length - 1] >= prices[0] ? "#dc2626" : "#2563eb";
  const bars = volumes.map((v, i) => {
    const bh = Math.max(1, (v / vmax) * volH);
    return `<rect x="${(xFor(i)-3).toFixed(1)}" y="${(volTop + volH - bh).toFixed(1)}" width="6" height="${bh.toFixed(1)}" fill="#94a3b8" opacity=".6"/>`;
  }).join("");
  const grid = [0,.5,1].map(t => {
    const y = top + priceH * t;
    const val = max - span * t;
    return `<line x1="${left}" y1="${y}" x2="${w-right}" y2="${y}" stroke="#e2e8f0"/><text x="5" y="${y+4}" font-size="11" fill="#64748b">${fmt.format(Math.round(val))}</text>`;
  }).join("");
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <rect width="${w}" height="${h}" fill="#fbfdff"/>
    ${grid}
    ${levelLine(support, "#0f766e", "지지")}
    ${levelLine(longLine, "#0891b2", "장기")}
    ${levelLine(resistance, "#dc2626", "저항", "3 4")}
    ${bars}
    <polyline points="${priceLine}" fill="none" stroke="${color}" stroke-width="3"/>
    <polyline points="${lineFor(ma5)}" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <polyline points="${lineFor(ma20)}" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <polyline points="${lineFor(ma60)}" fill="none" stroke="#0891b2" stroke-width="2"/>
    <text x="${left}" y="14" font-size="11" font-weight="800" fill="${color}">종가</text>
    <text x="${left+44}" y="14" font-size="11" font-weight="800" fill="#f59e0b">MA5</text>
    <text x="${left+86}" y="14" font-size="11" font-weight="800" fill="#7c3aed">MA20</text>
    <text x="${left+134}" y="14" font-size="11" font-weight="800" fill="#0891b2">MA60/장기선</text>
    <text x="${left+220}" y="14" font-size="11" font-weight="800" fill="#0f766e">지지</text>
    <text x="${left+254}" y="14" font-size="11" font-weight="800" fill="#dc2626">저항</text>
  </svg>`;
}
function actionsUrl() {
  const host = location.hostname;
  if (!host.endsWith("github.io")) return "https://github.com/";
  const owner = host.split(".")[0];
  const repo = location.pathname.split("/").filter(Boolean)[0];
  if (!owner || !repo) return "https://github.com/";
  return `https://github.com/${owner}/${repo}/actions/workflows/mobile-analysis.yml`;
}
function renderStocks(items, bottomCodes = new Set()) {
  document.querySelector("#stocks").innerHTML = items.map(item => `
    <article class="stock ${bottomCodes.has(item.code) ? "open" : ""}" data-code="${esc(item.code)}">
      <div class="stock-head" onclick="this.closest('.stock').classList.toggle('open')">
        <div>
          <h3>${item.rank}. ${esc(item.name)}</h3>
          <div class="sub">${esc(item.code)} · ${esc(item.sector)} · ${esc(item.theme)} · 현재 ${price(item.close)}</div>
          ${(item.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("")}
        </div>
        <div class="score">${Number(item.discoveryScore || 0).toFixed(1)}<span class="trade-pill ${tradeClass(item.tradeAction)}">${esc(item.tradeAction || "보류")}</span></div>
      </div>
      <div class="flow">
        <div><span>현가격</span><b>${price(item.close)}</b></div>
        <div><span>매매 타이밍</span><b class="trade-text ${tradeClass(item.tradeAction)}">${esc(item.tradeAction || "보류")}</b></div>
        <div><span>등락률</span><b class="${cls(item.changeRate)}">${pct(item.changeRate)}</b></div>
        <div><span>수급집중</span><b>${(Number(item.flowRatio || 0) * 100).toFixed(1)}%</b></div>
        <div><span>미국영향</span><b class="${cls(item.usImpact)}">${Number(item.usImpact || 0) >= 0 ? "+" : ""}${Number(item.usImpact || 0).toFixed(1)}</b></div>
      </div>
      <div class="detail">
        ${chart(item.chart, item)}
        <ul><li>타이밍: ${esc(item.tradeAction || "보류")} · ${esc(item.tradeReason || "")}</li></ul>
        <div class="paper-trade">
          <b>폰 모의투자 · 현가격 ${price(item.close)}</b>
          <div class="trade-form">
            <input id="mbuy-${item.code}" type="number" min="10000" step="10000" value="1000000">
            <button class="mini" onclick="event.stopPropagation(); mobileBuy('${item.code}')">금액매수</button>
          </div>
          <div class="trade-form">
            <input id="mbuyqty-${item.code}" type="number" min="1" step="1" placeholder="매수 수량">
            <button class="mini" onclick="event.stopPropagation(); mobileBuyQty('${item.code}')">수량매수</button>
          </div>
          <div class="trade-form">
            <input id="msell-${item.code}" type="number" min="1" step="1" placeholder="매도 수량">
            <button class="mini sell" onclick="event.stopPropagation(); mobileSell('${item.code}', false)">매도</button>
          </div>
          <button class="mini sell" onclick="event.stopPropagation(); mobileSell('${item.code}', true)">전량 매도</button>
        </div>
        <div class="flow">
          <div><span>외국인</span><b>${money(item.foreign)}</b></div>
          <div><span>기관</span><b>${money(item.institution)}</b></div>
          <div><span>거래대금</span><b>${money(item.value)}</b></div>
        </div>
        <ul>${(item.reasons || ["근거 부족"]).map(x => `<li>${esc(x)}</li>`).join("")}</ul>
        ${Number(item.bottomScore || 0) >= 45 ? `<ul>${(item.bottomReasons || []).map(x => `<li>바닥매집: ${esc(x)}</li>`).join("")}</ul>` : ""}
      </div>
    </article>
  `).join("") || `<div class="empty">분석 결과 없음</div>`;
}
async function loadData() {
  const res = await fetch(`data.json?t=${Date.now()}`);
  if (!res.ok) throw new Error("아직 분석 데이터가 없습니다. GitHub Actions 실행 후 다시 열어주세요.");
  const data = await res.json();
  lastPayload = data;
  render(data);
}
function render(data) {
  const items = data.items || [];
  const bottomCandidates = data.bottomCandidates || [];
  const bottomCodes = new Set(bottomCandidates.map(item => item.code));
  document.querySelector("#stamp").textContent = `생성: ${data.generatedAt || "-"} · ${data.marketCsv || ""}`;
  document.querySelector("#m-count").textContent = data.count || items.length;
  document.querySelector("#m-strong").textContent = items.filter(x => Number(x.discoveryScore) >= 75).length;
  document.querySelector("#m-flow").textContent = items.filter(x => Number(x.flowRatio) >= .05).length;
  document.querySelector("#bottomAlert").classList.toggle("open", bottomCandidates.length > 0);
  document.querySelector("#bottomList").innerHTML = bottomCandidates.map(item => `
    <div class="bottom-item">
      <b>${esc(item.name)} · ${Number(item.score || 0).toFixed(1)}점</b>
      <span>${esc(item.stage || "바닥매집 후보")} · 지지 ${fmt.format(item.support || 0)}원 · 터치 ${item.touchCount || 0}회</span>
      <span>${(item.reasons || []).slice(0,2).map(esc).join(" / ")}</span>
    </div>
  `).join("");
  const order = ["kospi","kosdaq","gold","usdkrw","nasdaq","sox","nvidia","tesla","bio","oil","china"];
  document.querySelector("#signals").innerHTML = order.map(k => data.signals?.[k]).filter(Boolean).map(sig => {
    const chg = Number(sig.change_pct || 0);
    const close = Number(sig.close || 0);
    return `<div class="signal"><b>${esc(sig.label || sig.symbol)}</b><span class="${cls(chg)}">${close ? `${fmt.format(close)} · ` : ""}${pct(chg)}</span></div>`;
  }).join("");
  document.querySelector("#sectors").innerHTML = (data.sectors || []).map(group => `
    <div class="sector">
      <b>${esc(group.sector)} · ${Number(group.topScore || 0).toFixed(1)}</b>
      ${(group.items || []).map(x => `<span>${esc(x.name)} ${Number(x.score || 0).toFixed(1)}점 · ${esc(x.theme)}</span>`).join("")}
    </div>
  `).join("") || `<div class="empty">섹터 후보 없음</div>`;
  const query = document.querySelector("#stockSearch").value.trim();
  const displayItems = query ? (data.searchItems || items).filter(item => stockMatches(item, query)).slice(0, 40) : items;
  renderStocks(displayItems, bottomCodes);
  renderPaper();
}
document.querySelector("#refresh").addEventListener("click", () => loadData().catch(err => alert(err.message)));
document.querySelector("#mp-reset").addEventListener("click", resetPaper);
document.querySelector("#runAction").addEventListener("click", () => {
  window.open(actionsUrl(), "_blank", "noopener");
});
document.querySelector("#stockSearch").addEventListener("input", event => renderSearch(event.target.value));
document.querySelector("#stockSearch").addEventListener("keydown", event => {
  if (event.key === "Enter") {
    const first = document.querySelector(".search-card");
    if (first) first.click();
  }
});
document.querySelector("#stockSearchGo").addEventListener("click", () => {
  renderSearch(document.querySelector("#stockSearch").value);
  const first = document.querySelector(".search-card");
  if (first) first.click();
});
document.querySelector("#stockSearchClear").addEventListener("click", () => {
  document.querySelector("#stockSearch").value = "";
  renderSearch("");
});
loadData().catch(err => {
  document.querySelector("#stocks").innerHTML = `<div class="empty">${esc(err.message)}</div>`;
});
setInterval(() => loadData().catch(() => {}), 120000);
</script>
</body>
</html>
